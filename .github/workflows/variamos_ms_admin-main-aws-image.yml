# More GitHub Actions for Azure: https://github.com/Azure/actions
# Last updated: 20230623:22:32

name: variamos_ms_admin-main-aws-image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to registry
        uses: docker/login-action@v1
        with:
          registry: ${{vars.ACR_DOKCERHUB}}
          username: ${{secrets.ACRUSERNAME_DOKCERHUB}}
          password: ${{secrets.ACRUSERPASSWORD_DOKCERHUB}}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{vars.ACR_DOKCERHUB}}/${{secrets.ACRUSERNAME_DOKCERHUB}}/variamos_ms_admin:main
          file: ./Dockerfile

      - name: Deploy changes into the server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.VARIAMOS_AWS_PEM }}
          script: |
            echo "Injecting GitHub Secrets into environment..."
            # On cible précisément tes variables d'admin pour ne pas toucher au reste
            sed -i -E '/^(GITHUB_TOKEN|GITHUB_APP_ID|GITHUB_PRIVATE_KEY|GITHUB_MANAGED_REPOS|GOOGLE_CLIENT_ID|GOOGLE_REDIRECT_URI|LOGIN_REDIRECT_URI|HOME_REDIRECT_URI|API_BASE_URL|SMTP_PASSWORD|SMTP_USER|SMTP_HOST|SMTP_PORT|SMTP_FROM|DB_SCHEMA|ADMIN_HOME_URI)=/d' .env.aws.develop
            echo "GITHUB_TOKEN=\"${{ secrets.ISSUES_PAT_TOKEN }}\"" >> .env.aws.develop
            echo "GITHUB_APP_ID=\"${{ vars.ISSUES_BOT_APP_ID }}\"" >> .env.aws.develop
            echo "GITHUB_PRIVATE_KEY=\"${{ secrets.ISSUES_BOT_PRIVATE_KEY }}\"" >> .env.aws.develop
            echo "GITHUB_MANAGED_REPOS=\"${{ vars.ISSUES_MANAGED_REPOS }}\"" >> .env.aws.develop
            echo "GOOGLE_CLIENT_ID=\"${{ vars.REACT_APP_GOOGLE_CLIENT_ID }}\"" >> .env.aws.develop
            echo "GOOGLE_REDIRECT_URI=\"${{ vars.REACT_APP_GOOGLE_REDIRECT_URI }}\"" >> .env.aws.develop
            echo "LOGIN_REDIRECT_URI=\"${{ vars.REACT_APP_LOGIN_URL }}\"" >> .env.aws.develop
            echo "HOME_REDIRECT_URI=\"${{ vars.REACT_APP_HOME_PAGE }}\"" >> .env.aws.develop
            echo "API_BASE_URL=\"${{ vars.REACT_APP_ADMIN_API_URL }}\"" >> .env.aws.develop
            echo "SMTP_PASSWORD=\"${{ secrets.SMTP_PASSWORD }}\"" >> .env.aws.develop
            echo "SMTP_USER=\"${{ secrets.SMTP_USER }}\"" >> .env.aws.develop
            echo "SMTP_HOST=\"${{ vars.SMTP_HOST }}\"" >> .env.aws.develop
            echo "SMTP_PORT=\"${{ vars.SMTP_PORT }}\"" >> .env.aws.develop
            echo "SMTP_FROM=\"${{ vars.SMTP_FROM }}\"" >> .env.aws.develop
            echo "DB_SCHEMA=\"${{ vars.DB_SCHEMA }}\"" >> .env.aws.develop
            echo "ADMIN_HOME_URI=\"${{ vars.ADMIN_HOME_URI }}\"" >> .env.aws.develop
            
            echo "Executing command on remote server..."
            docker compose --env-file .env.aws.develop -f docker-compose-aws-develop-nginx.yml pull variamos_ms_admin
            docker compose --env-file .env.aws.develop -f docker-compose-aws-develop-nginx.yml up -d variamos_ms_admin
            docker image prune -f
