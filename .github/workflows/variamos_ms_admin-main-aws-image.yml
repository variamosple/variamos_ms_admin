name: variamos_ms_admin-main-aws-image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Log in to registry
        uses: docker/login-action@v1
        with:
          registry: ${{vars.ACR_DOKCERHUB}}
          username: ${{secrets.ACRUSERNAME_DOKCERHUB}}
          password: ${{secrets.ACRUSERPASSWORD_DOKCERHUB}}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ${{vars.ACR_DOKCERHUB}}/${{secrets.ACRUSERNAME_DOKCERHUB}}/variamos_ms_admin:main
          file: ./Dockerfile

      - name: Deploy changes into the server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USERNAME }}
          key: ${{ secrets.VARIAMOS_AWS_PEM }}
          script: |
            echo "Injecting GitHub Secrets into environment..."
            export GITHUB_TOKEN="${{ secrets.ISSUES_PAT_TOKEN }}"
            export GITHUB_APP_ID="${{ vars.ISSUES_BOT_APP_ID }}"
            export GITHUB_PRIVATE_KEY="${{ secrets.ISSUES_BOT_PRIVATE_KEY }}"
            export GITHUB_MANAGED_REPOS="${{ vars.ISSUES_MANAGED_REPOS }}"
            export GOOGLE_CLIENT_ID="${{vars.REACT_APP_GOOGLE_CLIENT_ID}}"
            export GOOGLE_REDIRECT_URI="${{vars.REACT_APP_GOOGLE_REDIRECT_URI}}"
            export LOGIN_REDIRECT_URI="${{vars.REACT_APP_LOGIN_URL}}"
            export HOME_REDIRECT_URI="${{vars.REACT_APP_HOME_PAGE}}"
            export API_BASE_URL="${{vars.REACT_APP_ADMIN_API_URL}}"

            echo "Executing command on remote server..."
            docker compose --env-file .env.aws.develop -f docker-compose-aws-develop-nginx.yml pull variamos_ms_admin
            docker compose --env-file .env.aws.develop -f docker-compose-aws-develop-nginx.yml up -d variamos_ms_admin
            docker image prune -f
