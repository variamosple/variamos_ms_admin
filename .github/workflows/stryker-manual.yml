name: Mutation Testing (Stryker)

on:
  workflow_dispatch:
    inputs:
      partition:
        description: 'Which part of the codebase to run mutation tests on'
        required: true
        default: 'domain'
        type: choice
        options:
          - domain
          - entrypoints
          - all
  schedule:
    - cron: '0 4 * * *'

permissions:
  statuses: write
  contents: read

jobs:
  stryker:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for commits in the last 24 hours
      id: check_commits
      run: |
        if [ "${{ github.event_name }}" = "schedule" ]; then
          # Count commits in the last 24 hours
          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          echo "Found $COMMITS commit(s) in the last 24 hours."
          if [ "$COMMITS" -eq 0 ]; then
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi
        else
          echo "Manual trigger, running unconditionally."
          echo "should_run=true" >> $GITHUB_OUTPUT
        fi

    - name: Set Commit Status (Pending)
      if: steps.check_commits.outputs.should_run == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const sha = context.sha;
          await github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: sha,
            state: 'pending',
            context: 'Stryker / Mutation Score',
            description: 'Running Stryker mutation tests...',
          });

    - name: Set up Node.js
      if: steps.check_commits.outputs.should_run == 'true'
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Cache Stryker Incremental Data
      if: steps.check_commits.outputs.should_run == 'true'
      uses: actions/cache@v3
      with:
        path: |
          reports/stryker-incremental-domain.json
          reports/stryker-incremental-entrypoints.json
        key: stryker-incremental-${{ github.sha }}
        restore-keys: |
          stryker-incremental-

    - name: Install dependencies
      if: steps.check_commits.outputs.should_run == 'true'
      run: |
        npm ci

    - name: Run Stryker (Domain)
      if: ${{ steps.check_commits.outputs.should_run == 'true' && (inputs.partition == 'domain' || github.event_name == 'schedule' || inputs.partition == 'all') }}
      run: |
        npx stryker run stryker.domain.config.json --reporters progress,clear-text,html,json || true

    - name: Run Stryker (EntryPoints)
      if: ${{ steps.check_commits.outputs.should_run == 'true' && (inputs.partition == 'entrypoints' || inputs.partition == 'all') }}
      run: |
        npx stryker run stryker.entrypoints.config.json --reporters progress,clear-text,html,json || true

    - name: Publish Mutation Score Status
      if: ${{ always() && steps.check_commits.outputs.should_run == 'true' }}
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let score = null;
          try {
            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'reports/mutation/mutation.json');
            if (fs.existsSync(reportPath)) {
              const data = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              score = data.metrics.mutationScore;
            }
          } catch (e) {
            console.log('Failed to parse mutation report:', e);
          }

          const sha = context.sha;
          
          if (score !== null) {
            const roundedScore = score.toFixed(1);
            const target = 60.0;
            const met = score >= target;
            const description = met 
              ? `Score: ${roundedScore}% (Target: ${target}%) - Pass`
              : `Score: ${roundedScore}% (Target: ${target}%) - Under target`;

            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'success', // Keep status check successful (green) so it remains non-blocking
              context: 'Stryker / Mutation Score',
              description: description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

            // Also output to Job Summary
            let summaryMarkdown = `### Stryker Mutation Testing Summary\n`;
            summaryMarkdown += `- **Mutation Score:** ${roundedScore}%\n`;
            summaryMarkdown += `- **Target Gate:** ${target}%\n`;
            summaryMarkdown += `- **Status:** ${met ? '✅ Passed' : '⚠️ Warning: Under Target'}\n`;
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summaryMarkdown);
          } else {
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: sha,
              state: 'failure',
              context: 'Stryker / Mutation Score',
              description: 'Failed to retrieve mutation report.',
            });
          }
